name: First Interaction Welcome

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: First interaction check
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Thank you for opening your first issue here! Please make sure to read our CONTRIBUTING.md guidelines."
          pr-message: "Thank you for submitting your first pull request! Our team will review your changes as soon as possible."
